<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mishra Collective</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0d0d0d;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: black;
    border-bottom: 1px solid gold;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 40px;
}

.logo span {
    color: gold;
    font-size: 22px;
    font-weight: 700;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    background: url('banner.jpg') no-repeat center/cover;
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h2 {
    font-size: 50px;
    color: gold;
}

/* PRODUCTS */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px;
}

.card {
    background: #1a1a1a;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    text-align: center;
    border: 1px solid gold;
}

.card img {
    width: 100%;
}

.btn {
    background: gold;
    color: black;
    padding: 10px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid gold;
    margin-top: 30px;
}
</style></head><body><nav>
    <div class="logo">
        <img src="logo.png">
        <span>The Mishra Collective</span>
    </div><div>
    <a href="#">Home</a>
    <a href="#">Deals</a>
    <a href="#">Categories</a>
    <a href="#">Contact</a>
</div>

</nav><section class="hero">
    <h2>Smart Shopping, Better Living</h2>
</section><section class="products"><div class="card">
    <img src="https://via.placeholder.com/250">
    <h3>Wireless Earbuds</h3>
    <p>Top Quality Sound</p>
    <a href="YOUR_AFFILIATE_LINK" class="btn">Buy Now</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/250">
    <h3>Smart Watch</h3>
    <p>Track Fitness</p>
    <a href="YOUR_AFFILIATE_LINK" class="btn">Buy Now</a>
</div>

</section><footer>
    <p>© 2026 The Mishra Collective</p>
</footer></body>
</html>
