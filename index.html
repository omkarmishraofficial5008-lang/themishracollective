<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mishra Collective</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0d0d0d;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: black;
    border-bottom: 1px solid gold;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 40px;
}

.logo span {
    color: gold;
    font-size: 22px;
    font-weight: 700;
}

.search-box input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 200px;
}

/* HERO */
.hero {
    background: url('banner.jpg') no-repeat center/cover;
    height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.hero h2 {
    font-size: 45px;
    color: gold;
}

.hero p {
    color: #ccc;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid gold;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.price {
    color: gold;
    font-weight: bold;
}

.btn {
    background: gold;
    color: black;
    padding: 8px;
    display: block;
    margin-top: 10px;
    text-align: center;
    text-decoration: none;
    border-radius: 5px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid gold;
}
</style>
</head>

<body>

<nav>
    <div class="logo">
        <img src="logo.png">
        <span>The Mishra Collective</span>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>
</nav>

<section class="hero">
    <h2>Smart Shopping, Better Living</h2>
    <p>Best Deals • Top Products • Trusted Picks</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._SX522_.jpg">
        <h3>Wireless Earbuds</h3>
        <p class="price">₹999</p>
        <a href="YOUR_AFFILIATE_LINK" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL._SX522_.jpg">
        <h3>Smart Watch</h3>
        <p class="price">₹1,499</p>
        <a href="YOUR_AFFILIATE_LINK" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71F2ccIPPLL._SX522_.jpg">
        <h3>Bluetooth Speaker</h3>
        <p class="price">₹799</p>
        <a href="YOUR_AFFILIATE_LINK" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61IMRs+o0iL._SX522_.jpg">
        <h3>Power Bank</h3>
        <p class="price">₹699</p>
        <a href="YOUR_AFFILIATE_LINK" class="btn">Buy Now</a>
    </div>

</section>

<footer>
    <p>© 2026 The Mishra Collective</p>
</footer>

</body>
</html>
