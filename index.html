<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mishra Collective</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

nav {
    padding: 15px;
    background: black;
    color: gold;
    text-align: center;
    font-size: 22px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid gold;
    text-align: center;
}

.card img {
    width: 100%;
}

.btn {
    display: block;
    margin-top: 10px;
    background: gold;
    color: black;
    padding: 8px;
    text-decoration: none;
}
</style>
</head>

<body>

<nav>The Mishra Collective</nav>

<section class="products" id="product-list"></section>

<script>

// 👉 YAHI EDIT KARNA HOGA (Future me bas yahi change karna)
const products = [
{
name: "Wireless Earbuds",
image: "https://m.media-amazon.com/images/I/61CGHv6kmWL._SX522_.jpg",
link: "https://amzn.to/4diwNvW"
},
{
name: "Smart Watch",
image: "https://m.media-amazon.com/images/I/61ZjlBOp+rL._SX522_.jpg",
link: "https://amzn.to/4diwNvW"
},
{
name: "Bluetooth Speaker",
image: "https://m.media-amazon.com/images/I/71F2ccIPPLL._SX522_.jpg",
link: "https://amzn.to/4diwNvW"
}
];

// AUTO GENERATE (Touch mat karna)
const container = document.getElementById("product-list");

products.forEach(p => {
container.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<a href="${p.link}" target="_blank" class="btn">Buy Now</a>
</div>
`;
});

</script>

</body>
</html>
